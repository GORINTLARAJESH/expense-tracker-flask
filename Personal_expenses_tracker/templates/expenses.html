{% extends "base.html" %}

{% block content %}

<h3>All Expenses</h3>

<table class="table table-dark mt-3">
    <tr>
        <th>Date</th>
        <th>Type</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Actions</th>
    </tr>

    {% for e in expenses %}
    <tr>
        <td>{{ e.date }}</td>
        <td>{{ e.type }}</td>
        <td>{{ e.category }}</td>
        <td>₹ {{ e.amount }}</td>
        <td>
            <a href="/edit/{{ e.id }}" class="btn btn-warning btn-sm">Edit</a>
            <a href="/delete/{{ e.id }}" class="btn btn-danger btn-sm">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
