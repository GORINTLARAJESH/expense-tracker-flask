<!-- templates/components/cards.html -->

<div class="row g-4">

    <!-- Income Card -->
    <div class="col-md-4">
        <div class="card-custom text-center position-relative overflow-hidden p-3">

            <div class="icon-bg text-success mb-2">
                <i class="fas fa-arrow-down"></i>
            </div>

            <h6 class="card-title">Total Income</h6>

            <h2 class="fw-bold counter" data-value="{{ income }}">₹ 0</h2>

            <p class="text-success small">+ Money In</p>

        </div>
    </div>

    <!-- Expense Card -->
    <div class="col-md-4">
        <div class="card-custom text-center position-relative overflow-hidden p-3">

            <div class="icon-bg text-danger mb-2">
                <i class="fas fa-arrow-up"></i>
            </div>

            <h6 class="card-title">Total Expense</h6>

            <h2 class="fw-bold counter" data-value="{{ expense }}">₹ 0</h2>

            <p class="text-danger small">- Money Out</p>

        </div>
    </div>

    <!-- Balance Card -->
    <div class="col-md-4">
        <div class="card-custom text-center position-relative overflow-hidden p-3">

            <div class="icon-bg text-info mb-2">
                <i class="fas fa-wallet"></i>
            </div>

            <h6 class="card-title">Balance</h6>

            <h2 class="fw-bold counter" data-value="{{ balance }}">₹ 0</h2>

            <p class="text-info small">Available</p>

        </div>
    </div>

</div>

<!-- ================= STYLES ================= -->
<style>
    .card-title {
        color: #94a3b8;
        margin-top: 10px;
        font-size: 14px;
    }

    .icon-bg {
        font-size: 22px;
    }

    /* Glow Effect (FIXED) */
    .card-custom::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle, rgba(99,102,241,0.2), transparent);
        top: -50%;
        left: -50%;
        opacity: 0;
        transition: 0.5s;
        pointer-events: none; /* 🔥 IMPORTANT FIX */
    }

    .card-custom:hover::before {
        opacity: 1;
    }
</style>

<!-- ================= COUNTER ANIMATION ================= -->
<script>
document.querySelectorAll(".counter").forEach(counter => {

    let target = parseFloat(counter.getAttribute("data-value")) || 0;
    let count = 0;
    let speed = target / 50;

    function updateCounter() {
        count += speed;

        if (count < target) {
            counter.innerText = "₹ " + Math.floor(count);
            requestAnimationFrame(updateCounter);
        } else {
            counter.innerText = "₹ " + target;
        }
    }

    updateCounter();
});
</script>
