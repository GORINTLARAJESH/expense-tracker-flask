{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <!-- Page Title -->
    <div class="mb-4">
        <h2><i class="fas fa-plus-circle"></i> Add Expense / Income</h2>
        <p style="color:#94a3b8;">Track your spending smartly 💡</p>
    </div>

    <!-- Form Card -->
    <div class="card-custom fade-in p-4">

        <form method="POST" action="{{ url_for('dashboard.add_expense') }}">

            <div class="row">

                <!-- Date -->
                <div class="col-md-6 mb-3">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" class="form-control" required>
                </div>

                <!-- Type -->
                <div class="col-md-6 mb-3">
                    <label for="type">Type</label>
                    <select id="type" name="type" class="form-control">
                        <option value="income">💰 Income</option>
                        <option value="expense">💸 Expense</option>
                    </select>
                </div>

                <!-- Category -->
                <div class="col-md-6 mb-3">
                    <label for="category">Category</label>
                    <input type="text" id="category" name="category"
                           placeholder="e.g. Food, Rent"
                           class="form-control" required>
                </div>

                <!-- Amount -->
                <div class="col-md-6 mb-3">
                    <label for="amount">Amount (₹)</label>
                    <input type="number" id="amount" name="amount"
                           placeholder="Enter amount"
                           class="form-control" required>
                </div>

            </div>

            <!-- Buttons -->
            <div class="mt-3 d-flex justify-content-between align-items-center">

                <button type="submit" class="btn btn-custom" id="submitBtn">
                    <i class="fas fa-save"></i> Save Transaction
                </button>

                <a href="/dashboard" class="btn btn-outline-light">
                    <i class="fas fa-arrow-left"></i> Back
                </a>

            </div>

        </form>

    </div>

    <!-- Smart Tip Card -->
    <div class="card-custom mt-4 fade-in p-4">
        <h5><i class="fas fa-lightbulb"></i> Smart Tip</h5>
        <p style="color:#cbd5f5;">
            Categorize your expenses properly to unlock powerful insights 📊.
        </p>
    </div>

</div>

<!-- OPTIONAL: BUTTON LOADING EFFECT -->
<script>
document.querySelector("form").addEventListener("submit", function() {
    document.getElementById("submitBtn").innerHTML = "⏳ Saving...";
});
</script>

{% endblock %}
