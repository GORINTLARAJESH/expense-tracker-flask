<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

    <style>
        * { font-family: 'Poppins', sans-serif; }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            overflow-x: hidden;
        }

        .sidebar {
            height: 100vh;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            position: fixed;
            width: 240px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover,
        .sidebar a.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }

        .main {
            margin-left: 250px;
            padding: 20px;
        }

        .navbar-custom {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .card-custom {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 20px;
        }

        .btn-custom {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            color: white;
            transition: 0.3s;
        }

        .btn-custom:hover {
            transform: scale(1.05);
            opacity: 0.9;
        }

        .fade-in {
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h3>💰 Finance</h3>

    <!-- ✅ FIXED ROUTES -->
    <a href="/dashboard" class="menu-item"><i class="fas fa-home"></i> Dashboard</a>
    <a href="/expenses" class="menu-item"><i class="fas fa-wallet"></i> Expenses</a>
    <a href="/add_expense" class="menu-item"><i class="fas fa-plus"></i> Add Expense</a>

    <!-- ✅ CORRECTED -->
    <a href="/income" class="menu-item"><i class="fas fa-chart-line"></i> Income</a>
    <a href="/budget" class="menu-item"><i class="fas fa-piggy-bank"></i> Budget</a>
    <a href="/goals" class="menu-item"><i class="fas fa-bullseye"></i> Goals</a>

    <a href="/logout" class="menu-item"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<!-- Main Content -->
<div class="main">

    <!-- Navbar -->
    <div class="navbar-custom d-flex justify-content-between align-items-center">
        <h4>Dashboard</h4>
        <div>
            <i class="fas fa-bell me-3"></i>
            <i class="fas fa-user-circle"></i>
        </div>
    </div>

    <!-- Dynamic Content -->
    <div class="fade-in">
        {% block content %}{% endblock %}
    </div>

</div>

<!-- ================= JS ================= -->

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<!-- Custom JS -->
<script src="{{ url_for('static', filename='js/animations.js') }}"></script>
<script src="{{ url_for('static', filename='js/charts.js') }}"></script>
<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
